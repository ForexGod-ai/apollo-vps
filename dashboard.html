<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard - Active Trades</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            font-size: 1em;
            opacity: 0.8;
        }
        .trades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .trade-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }
        .trade-card:hover {
            transform: translateY(-5px);
        }
        .trade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .symbol {
            font-size: 1.5em;
            font-weight: bold;
        }
        .direction {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .direction.buy, .direction.long {
            background: rgba(34, 197, 94, 0.3);
            border: 1px solid #22c55e;
        }
        .direction.sell, .direction.short {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid #ef4444;
        }
        .trade-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }
        .detail-label {
            opacity: 0.8;
        }
        .detail-value {
            font-weight: bold;
        }
        .trade-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9em;
            opacity: 0.7;
        }
        .no-trades {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.5em;
            opacity: 0.7;
        }
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 ForexGod Trading Dashboard</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Active Trades</div>
                <div class="stat-value" id="total-trades">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Volume</div>
                <div class="stat-value" id="total-lots">0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg R:R</div>
                <div class="stat-value" id="avg-rr">0.0</div>
            </div>
        </div>

        <div class="trades-grid" id="trades-container">
            <div class="no-trades">📭 Loading trades...</div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadTradesFromHistory()">🔄 Refresh</button>

    <script>
        // Load from trade_history.json (active trades only)
        async function loadTradesFromHistory() {
            try {
                const response = await fetch('trade_history.json');
                const allTrades = await response.json();
                
                // Filter only OPEN trades
                const activeTrades = allTrades.filter(t => t.status === 'OPEN');
                
                // Update stats
                document.getElementById('total-trades').textContent = activeTrades.length;
                
                const totalLots = activeTrades.reduce((sum, t) => sum + (t.lot_size || t.lots || 0), 0);
                document.getElementById('total-lots').textContent = totalLots.toFixed(2);
                
                const avgRR = activeTrades.length > 0 
                    ? activeTrades.reduce((sum, t) => sum + (t.risk_reward || 0), 0) / activeTrades.length 
                    : 0;
                document.getElementById('avg-rr').textContent = avgRR.toFixed(1);
                
                // Display trades
                const container = document.getElementById('trades-container');
                
                if (activeTrades.length === 0) {
                    container.innerHTML = '<div class="no-trades">📭 No active trades</div>';
                    return;
                }
                
                container.innerHTML = activeTrades.map(trade => {
                    const entry = trade.entry || trade.entry_price;
                    const sl = trade.stop_loss || trade.sl;
                    const tp = trade.take_profit || trade.tp;
                    const lots = trade.lot_size || trade.lots;
                    const rr = trade.risk_reward;
                    
                    return `
                    <div class="trade-card">
                        <div class="trade-header">
                            <div class="symbol">${trade.symbol}</div>
                            <div class="direction ${trade.direction.toLowerCase()}">${trade.direction.toUpperCase()}</div>
                        </div>
                        <div class="trade-details">
                            <div class="detail-row">
                                <span class="detail-label">Entry:</span>
                                <span class="detail-value">${entry ? entry.toFixed(5) : 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Ticket:</span>
                                <span class="detail-value">#${trade.ticket}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">SL:</span>
                                <span class="detail-value">${sl ? sl.toFixed(5) : 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">TP:</span>
                                <span class="detail-value">${tp ? tp.toFixed(5) : 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Lots:</span>
                                <span class="detail-value">${lots ? lots.toFixed(2) : 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">R:R:</span>
                                <span class="detail-value">1:${rr ? rr.toFixed(2) : 'N/A'}</span>
                            </div>
                        </div>
                        <div class="trade-footer">
                            📅 ${new Date(trade.open_time).toLocaleString('ro-RO')}
                            <br>
                            🎯 Strategy: ${trade.strategy || trade.strategy_type || 'SMC'}
                        </div>
                    </div>
                `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading trades:', error);
                document.getElementById('trades-container').innerHTML = 
                    `<div class="no-trades">❌ Error: ${error.message}</div>`;
            }
        }

        // Load on page load
        loadTradesFromHistory();
        
        // Auto-refresh every 5 seconds
        setInterval(loadTradesFromHistory, 5000);
    </script>
</body>
</html>
